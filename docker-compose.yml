services:
  backend:
    build:
      context: ./backend
      target: runtime
    image: client-agent-backend:local
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ${ONEDRIVE_SYNC_PATH:-./data}:/mnt/onedrive:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: runtime
    image: client-agent-frontend:local
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
