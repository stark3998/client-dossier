name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check backend/app
      - run: mypy backend/app --ignore-missing-imports

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx
      - run: pytest backend/tests -v
        env:
          LOCAL_MODE: "true"
          DISABLE_TELEMETRY: "true"
          AZURE_OPENAI_ENDPOINT: "http://mock"
          AZURE_OPENAI_API_KEY: "mock"
          AZURE_OPENAI_DEPLOYMENT: "mock"
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "mock"
          AZURE_SEARCH_ENDPOINT: "http://mock"
          AZURE_SEARCH_API_KEY: "mock"
          AZURE_SEARCH_INDEX_NAME: "mock"
          COSMOS_ENDPOINT: "http://mock"
          COSMOS_KEY: "mock"
          COSMOS_DB_NAME: "mock"
          ONEDRIVE_SYNC_PATH: "/tmp"

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No package-lock.json yet -- skip npm cache
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t client-agent-backend:ci --target runtime ./backend
      - name: Build frontend image
        run: docker build -t client-agent-frontend:ci --target runtime ./frontend

  terraform-plan:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false
      - name: Terraform Validate
        working-directory: infra
        run: terraform validate
